<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Search</title>
  </head>
  <body style="background:white; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:Segoe UI, sans-serif;">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" style="width:180px; margin-bottom:30px;">
    <form action="https://www.bing.com/search" method="GET" style="width:50%; max-width:500px;">
      <input type="text" name="q" autofocus style="width:100%; padding:12px 18px; border-radius:24px; border:1px solid #ddd; font-size:16px; outline:none;">
    </form>
  </body>
</html>
