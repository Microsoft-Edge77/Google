<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chrome New Tab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: #202124;
      text-align: center;
    }

    /* Header */
    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 14px 20px;
      font-size: 15px;
      color: #5f6368;
    }

    header a {
      margin-left: 20px;
      color: #5f6368;
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    /* Logo */
    .logo {
      margin-top: 140px;
      margin-bottom: 30px;
    }

    .logo img {
      width: 272px;
    }

    /* Search bar */
    .search-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .search-box {
      width: 580px;
      max-width: 90%;
      display: flex;
      align-items: center;
      border: 1px solid #dcdcdc;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 16px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
    }

    .search-box:hover {
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }

    /* Buttons */
    .buttons {
      margin-top: 30px;
    }

    .buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      padding: 10px 20px;
      margin: 6px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .buttons button:hover {
      border: 1px solid #dadce0;
    }
  </style>
</head>

<body>

<header>
  <a href="about.html">À propos</a>
  <a id="imagesLink">Images</a>
  <a href="https://outlook.live.com" target="_blank">Gmail</a>
  <a href="https://mail.orange.fr" target="_blank">Mail Orange</a>
  <a href="https://apps.microsoft.com/store" target="_blank">Store</a>
</header>

<div class="logo">
  <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
</div>

<div class="search-container">
  <form id="searchForm" class="search-box">
    <input type="text" id="searchInput" name="q" placeholder="Rechercher sur Google…">
  </form>
</div>

<div class="buttons">
  <button onclick="launchSearch()">Rechercher avec Google</button>
  <button onclick="feelingLucky()">J'ai de la chance</button>
</div>

<script>
  // Recherche normale → Bing
  function launchSearch() {
    const q = document.getElementById("searchInput").value.trim();
    if (q !== "") {
      window.location.href = "https://www.bing.com/search?q=" + encodeURIComponent(q);
    }
  }

  // J'ai de la chance → Bing direct
  function feelingLucky() {
    const q = document.getElementById("searchInput").value.trim();
    if (q !== "") {
      window.open("https://www.bing.com/search?q=" + encodeURIComponent(q), "_blank");
    }
  }

  // Entrée = lancer la recherche
  document.getElementById("searchForm").addEventListener("submit", function(e) {
    e.preventDefault();
    launchSearch();
  });

  // Lien Images → Bing Images
  document.getElementById("imagesLink").addEventListener("click", function() {
    const q = document.getElementById("searchInput").value.trim();
    const encoded = encodeURIComponent(q);
    window.open("https://www.bing.com/images/search?q=" + encoded, "_blank");
  });
</script>

</body>
</html>
