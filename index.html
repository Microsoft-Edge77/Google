<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Google</title>
  <style>
    body {
      background: white;
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      animation: fadein 0.6s ease;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .search-box {
      width: 50%;
      max-width: 520px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 18px;
      border-radius: 24px;
      border: 1px solid #ddd;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4285f4;
      box-shadow: 0 0 4px rgba(66, 133, 244, 0.4);
    }

    /* Logo Copilot discret */
    .copilot {
      position: absolute;
      top: 18px;
      right: 22px;
      opacity: 0.85;
      transition: 0.2s;
    }

    .copilot:hover {
      opacity: 1;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- Logo Copilot discret -->
  <a href="https://copilot.microsoft.com" class="copilot" title="Ouvrir Copilot">
    <img src="https://seeklogo.com/images/M/microsoft-copilot-logo-8F1C1C7C0E-seeklogo.com.png" width="38">
  </a>

  <!-- Logo Google -->
  <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
       style="width:180px; margin-bottom:30px;">

  <!-- Barre de recherche -->
  <form action="https://www.bing.com/search" method="GET" class="search-box">
    <input type="text" name="q" autofocus placeholder="Rechercher…">
  </form>

</body>
</html>
