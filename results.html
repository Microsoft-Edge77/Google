<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultats de recherche</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: #202124;
    }

    header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #dadce0;
    }

    .logo img {
      width: 120px;
      margin-right: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1px solid #dcdcdc;
      font-size: 16px;
      outline: none;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
      line-height: 1.6;
    }

    .result {
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .result-url {
      font-size: 13px;
      color: #006621;
    }

    .result-title a {
      font-size: 20px;
      color: #1a0dab;
      text-decoration: none;
    }

    .result-title a:hover {
      text-decoration: underline;
    }

    .result-snippet {
      font-size: 15px;
      color: #4d5156;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png">
    </a>
  </div>

  <form id="searchForm" style="flex:1;">
    <input type="text" id="searchInput" name="q" placeholder="Rechercher…">
  </form>
</header>

<main id="results"></main>

<script>
  const params = new URLSearchParams(window.location.search);
  const query = params.get("q") || "";
  document.getElementById("searchInput").value = query;

  // Base de données de marques
  const brands = {
    "amazon": "https://www.amazon.fr/",
    "netflix": "https://www.netflix.com/",
    "discord": "https://discord.com/",
    "spotify": "https://www.spotify.com/",
    "apple": "https://www.apple.com/",
    "microsoft": "https://www.microsoft.com/",
    "google": "https://www.google.com/",
    "youtube": "https://www.youtube.com/",
    "facebook": "https://www.facebook.com/",
    "instagram": "https://www.instagram.com/",
    "twitter": "https://twitter.com/",
    "x": "https://twitter.com/",
    "reddit": "https://www.reddit.com/",
    "github": "https://github.com/",
    "gitlab": "https://gitlab.com/",
    "wikipedia": "https://fr.wikipedia.org/",
    "wiki": "https://fr.wikipedia.org/",
    "nike": "https://www.nike.com/",
    "adidas": "https://www.adidas.com/",
    "tesla": "https://www.tesla.com/",
    "samsung": "https://www.samsung.com/",
    "huawei": "https://www.huawei.com/",
    "xiaomi": "https://www.mi.com/",
    "lenovo": "https://www.lenovo.com/",
    "dell": "https://www.dell.com/",
    "hp": "https://www.hp.com/",
    "asus": "https://www.asus.com/",
    "nvidia": "https://www.nvidia.com/",
    "amd": "https://www.amd.com/",
    "intel": "https://www.intel.com/"
  };

  function getHost(url) {
    try { return new URL(url).hostname; }
    catch { return url; }
  }

  function generateResults(q) {
    const encoded = encodeURIComponent(q);
    const lower = q.toLowerCase();
    const results = [];

    // 1. Site officiel si marque reconnue
    for (const key in brands) {
      if (lower.includes(key)) {
        results.push({
          url: brands[key],
          title: `${key.charAt(0).toUpperCase() + key.slice(1)} – Site officiel`,
          snippet: `Site officiel de ${key}.`
        });
        break;
      }
    }

    // 2. Bing Web
    results.push({
      url: `https://www.bing.com/search?q=${encoded}`,
      title: `Résultats Bing pour « ${q} »`,
      snippet: `Recherche Bing pour « ${q} ».`
    });

    // 3. Résultats enrichis
    results.push(
      {
        url: `https://fr.wikipedia.org/wiki/${encoded}`,
        title: `Wikipédia – ${q}`,
        snippet: `Article Wikipédia lié à « ${q} ».`
      },
      {
        url: `https://www.reddit.com/search/?q=${encoded}`,
        title: `Reddit – ${q}`,
        snippet: `Discussions Reddit concernant « ${q} ».`
      },
      {
        url: `https://stackoverflow.com/search?q=${encoded}`,
        title: `StackOverflow – ${q}`,
        snippet: `Questions techniques liées à « ${q} ».`
      },
      {
        url: `https://github.com/search?q=${encoded}`,
        title: `GitHub – ${q}`,
        snippet: `Dépôts GitHub liés à « ${q} ».`
      },
      {
        url: `https://www.bing.com/images/search?q=${encoded}`,
        title: `Images Bing – ${q}`,
        snippet: `Images trouvées pour « ${q} ».`
      },
      {
        url: `https://www.bing.com/videos/search?q=${encoded}`,
        title: `Vidéos Bing – ${q}`,
        snippet: `Vidéos correspondant à « ${q} ».`
      }
    );

    return results.map(r => `
      <div class="result">
        <div class="result-url">${getHost(r.url)}</div>
        <div class="result-title"><a href="${r.url}" target="_blank">${r.title}</a></div>
        <div class="result-snippet">${r.snippet}</div>
      </div>
    `).join("");
  }

  document.getElementById("results").innerHTML = generateResults(query);

  document.getElementById("searchForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const newQuery = document.getElementById("searchInput").value;
    window.location.href = "results.html?q=" + encodeURIComponent(newQuery);
  });
</script>

</body>
</html>
