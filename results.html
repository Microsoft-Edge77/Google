<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche Google</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: #202124;
    }

    header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #dadce0;
    }

    .logo img {
      width: 120px;
      margin-right: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1px solid #dcdcdc;
      font-size: 16px;
      outline: none;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
      line-height: 1.6;
    }

    .result {
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .result-url {
      font-size: 13px;
      color: #006621;
    }

    .result-title a {
      font-size: 20px;
      color: #1a0dab;
      text-decoration: none;
    }

    .result-title a:hover {
      text-decoration: underline;
    }

    .result-snippet {
      font-size: 15px;
      color: #4d5156;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png">
    </a>
  </div>

  <form id="searchForm" style="flex:1;">
    <input type="text" id="searchInput" name="q" placeholder="Rechercher…">
  </form>
</header>

<main id="results"></main>

<script>
  const params = new URLSearchParams(window.location.search);
  const query = (params.get("q") || "").toLowerCase().trim();
  document.getElementById("searchInput").value = query;

  // 🔥 Détection ultra-intelligente : fautes, variantes, intentions
  function detectMainSite(q) {
    const patterns = [
      { keys: ["amazon", "amzn", "amazone", "acheter", "shopping"], site: "amazon.com" },
      { keys: ["youtube", "yt", "ytb", "video"], site: "youtube.com" },
      { keys: ["facebook", "fb"], site: "facebook.com" },
      { keys: ["instagram", "insta"], site: "instagram.com" },
      { keys: ["chatgpt", "gpt", "chat gpt"], site: "chatgpt.com" },
      { keys: ["x.com", "twitter", "twt"], site: "x.com" },
      { keys: ["reddit", "redit"], site: "reddit.com" },
      { keys: ["wikipedia", "wiki"], site: "wikipedia.org" },
      { keys: ["whatsapp", "whatapp"], site: "whatsapp.com" },
      { keys: ["bing", "bng"], site: "bing.com" },
      { keys: ["tiktok", "tik tok"], site: "tiktok.com" },
      { keys: ["yahoo"], site: "yahoo.com" },
      { keys: ["yandex"], site: "yandex.ru" },
      { keys: ["baidu"], site: "baidu.com" },
      { keys: ["linkedin", "job", "travail"], site: "linkedin.com" },
      { keys: ["netflix", "film", "serie"], site: "netflix.com" },
      { keys: ["temu"], site: "temu.com" },
      { keys: ["ebay"], site: "ebay.com" },
      { keys: ["aliexpress", "ali express"], site: "aliexpress.com" },
      { keys: ["pinterest"], site: "pinterest.com" },
      { keys: ["outlook", "mail", "email"], site: "live.com" },
      { keys: ["orange"], site: "mail.orange.fr" },
      { keys: ["office", "word", "excel"], site: "office.com" },
      { keys: ["microsoft"], site: "microsoft.com" },
      { keys: ["weather", "meteo", "météo"], site: "weather.com" },
      { keys: ["twitch"], site: "twitch.tv" },
      { keys: ["roblox"], site: "roblox.com" },
      { keys: ["canva"], site: "canva.com" },
      { keys: ["bilibili"], site: "bilibili.com" },
      { keys: ["vk"], site: "vk.com" },
      { keys: ["telegram", "t.me"], site: "t.me" },
      { keys: ["mail.ru"], site: "mail.ru" },
      { keys: ["gemini"], site: "gemini.google.com" },
      { keys: ["news"], site: "nytimes.com" }
    ];

    for (const p of patterns) {
      if (p.keys.some(k => q.includes(k))) return p.site;
    }
    return null;
  }

  // 🔥 Base de données des sites
  const sites = [
    { host: "amazon.com", title: "Amazon", snippet: "Marketplace mondial." },
    { host: "youtube.com", title: "YouTube", snippet: "Plateforme vidéo." },
    { host: "facebook.com", title: "Facebook", snippet: "Réseau social." },
    { host: "instagram.com", title: "Instagram", snippet: "Partage de photos." },
    { host: "chatgpt.com", title: "ChatGPT", snippet: "IA et chatbots." },
    { host: "x.com", title: "X (Twitter)", snippet: "Réseau social." },
    { host: "reddit.com", title: "Reddit", snippet: "Communauté et discussions." },
    { host: "wikipedia.org", title: "Wikipédia", snippet: "Encyclopédie libre." },
    { host: "whatsapp.com", title: "WhatsApp", snippet: "Messagerie instantanée." },
    { host: "bing.com", title: "Bing", snippet: "Moteur de recherche." },
    { host: "tiktok.com", title: "TikTok", snippet: "Vidéos courtes." },
    { host: "yahoo.com", title: "Yahoo", snippet: "Actualités et services." },
    { host: "yandex.ru", title: "Yandex", snippet: "Moteur de recherche russe." },
    { host: "baidu.com", title: "Baidu", snippet: "Moteur de recherche chinois." },
    { host: "linkedin.com", title: "LinkedIn", snippet: "Réseau professionnel." },
    { host: "netflix.com", title: "Netflix", snippet: "Streaming vidéo." },
    { host: "temu.com", title: "Temu", snippet: "Marketplace discount." },
    { host: "ebay.com", title: "eBay", snippet: "Marketplace mondial." },
    { host: "aliexpress.com", title: "AliExpress", snippet: "Marketplace chinois." },
    { host: "pinterest.com", title: "Pinterest", snippet: "Inspiration visuelle." },
    { host: "live.com", title: "Outlook", snippet: "Messagerie Microsoft." },
    { host: "mail.orange.fr", title: "Mail Orange", snippet: "Messagerie Orange." },
    { host: "office.com", title: "Office", snippet: "Suite Microsoft Office." },
    { host: "microsoft.com", title: "Microsoft", snippet: "Technologie et logiciels." },
    { host: "weather.com", title: "Weather.com", snippet: "Prévisions météo." },
    { host: "twitch.tv", title: "Twitch", snippet: "Streaming jeux vidéo." },
    { host: "roblox.com", title: "Roblox", snippet: "Jeux et création." },
    { host: "canva.com", title: "Canva", snippet: "Graphisme en ligne." },
    { host: "bilibili.com", title: "Bilibili", snippet: "Animation et comics." },
    { host: "vk.com", title: "VK", snippet: "Réseau social russe." },
    { host: "t.me", title: "Telegram", snippet: "Messagerie sécurisée." },
    { host: "mail.ru", title: "Mail.ru", snippet: "Messagerie russe." },
    { host: "nytimes.com", title: "New York Times", snippet: "Actualités internationales." }
  ];

  function generateResults(q) {
    const main = detectMainSite(q);

    let ordered = [];

    if (main) {
      const mainSite = sites.find(s => s.host === main);
      if (mainSite) ordered.push(mainSite);
    }

    ordered.push(...sites.filter(s => s.host !== main));

    return ordered.map(s => `
      <div class="result">
        <div class="result-url">${s.host}</div>
        <div class="result-title"><a href="https://${s.host}" target="_blank">${s.title}</a></div>
        <div class="result-snippet">${s.snippet}</div>
      </div>
    `).join("");
  }

  document.getElementById("results").innerHTML = generateResults(query);

  document.getElementById("searchForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const newQuery = document.getElementById("searchInput").value;
    window.location.href = "results.html?q=" + encodeURIComponent(newQuery);
  });
</script>

</body>
</html>
